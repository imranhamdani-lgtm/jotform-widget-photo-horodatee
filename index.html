<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Photo Horodatée — HARS Analytics</title>
  <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
      color: #1e293b;
      padding: 12px;
      -webkit-tap-highlight-color: transparent;
    }

    #gps-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    #gps-status.acquiring { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
    #gps-status.acquired  { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
    #gps-status.error     { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    #gps-status .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    #gps-status.acquiring .dot { background: #eab308; animation: pulse 1.2s infinite; }
    #gps-status.acquired  .dot { background: #22c55e; }
    #gps-status.error     .dot { background: #ef4444; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin   { to { transform: rotate(360deg); } }

    #counter {
      font-size: 12px; color: #64748b; text-align: right; margin-bottom: 10px;
    }
    #counter span { font-weight: 600; color: #2d1b69; }

    #btn-capture {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px;
      background: #2d1b69; color: #fff;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 14px;
      -webkit-user-select: none; user-select: none;
    }
    #btn-capture:active   { background: #7c3aed; transform: scale(0.98); }
    #btn-capture:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    #btn-capture svg      { width: 22px; height: 22px; flex-shrink: 0; }

    #file-input { display: none; }

    #processing {
      display: none; align-items: center; justify-content: center; gap: 10px;
      padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; margin-bottom: 14px; font-size: 13px; color: #64748b;
    }
    #processing.visible { display: flex; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #e2e8f0; border-top-color: #2d1b69;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    #photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .photo-card {
      position: relative; border-radius: 8px; overflow: hidden;
      border: 1px solid #e2e8f0; aspect-ratio: 4/3; background: #f1f5f9;
    }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-card .delete-btn {
      position: absolute; top: 6px; right: 6px;
      width: 26px; height: 26px;
      background: rgba(239,68,68,0.9); color: white;
      border: none; border-radius: 50%;
      font-size: 14px; font-weight: bold; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-card .photo-index {
      position: absolute; bottom: 6px; left: 6px;
      background: rgba(0,0,0,0.6); color: white;
      font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
    }
    .photo-card .upload-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    .photo-card .upload-overlay .spinner {
      border-color: rgba(255,255,255,0.3);
      border-top-color: #fff;
    }

    #error-msg {
      display: none; padding: 10px 12px;
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 8px; font-size: 13px; color: #b91c1c; margin-top: 10px;
    }
    #error-msg.visible { display: block; }

    #empty-state {
      text-align: center; padding: 24px 16px;
      color: #94a3b8; font-size: 13px;
      border: 2px dashed #e2e8f0; border-radius: 8px;
    }
    #empty-state svg {
      width: 40px; height: 40px;
      margin: 0 auto 10px; display: block; opacity: 0.4;
    }
  </style>
</head>
<body>

  <div id="gps-status" class="acquiring">
    <span class="dot"></span>
    <span id="gps-text">Acquisition GPS en cours…</span>
  </div>

  <div id="counter"><span id="count-current">0</span> / <span id="count-max">3</span> photos</div>

  <button id="btn-capture" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    Prendre une photo
  </button>

  <input type="file" id="file-input" accept="image/*" capture="environment">

  <div id="processing"><div class="spinner"></div><span id="processing-text">Traitement en cours…</span></div>

  <div id="photos-grid"></div>
  <div id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    Aucune photo capturée
  </div>

  <div id="error-msg"></div>

  <script>
  (function () {
    'use strict';

    // ─── Settings ─────────────────────────────────────────────────
    var settings = {
      maxPhotos:       3,
      brandingText:    'HARS Analytics — Horodatage certifié',
      imageQuality:    0.82,
      maxWidth:        1280,
      requireGPS:      false,
      overlayPosition: 'bottom',
      uploadWorkerUrl: '',   // URL du Cloudflare Worker (vide = fallback base64)
    };

    // ─── État ─────────────────────────────────────────────────────
    var gpsPosition  = null;
    var gpsWatchId   = null;
    var isProcessing = false;

    // Chaque entrée :
    // { filename, previewUrl, url, base64, timestamp, lat, lon }
    // - url    : URL Supabase (si Worker configuré)
    // - base64 : fallback si pas de Worker
    var photos = [];

    // ─── DOM ──────────────────────────────────────────────────────
    var elGpsStatus     = document.getElementById('gps-status');
    var elGpsText       = document.getElementById('gps-text');
    var elCountCur      = document.getElementById('count-current');
    var elCountMax      = document.getElementById('count-max');
    var elBtnCapture    = document.getElementById('btn-capture');
    var elFileInput     = document.getElementById('file-input');
    var elProcessing    = document.getElementById('processing');
    var elProcessingTxt = document.getElementById('processing-text');
    var elGrid          = document.getElementById('photos-grid');
    var elEmpty         = document.getElementById('empty-state');
    var elError         = document.getElementById('error-msg');

    // ─── GPS ──────────────────────────────────────────────────────
    function startGPS() {
      if (!navigator.geolocation) {
        setGPSStatus('error', 'GPS non supporté par ce navigateur');
        return;
      }
      setGPSStatus('acquiring', 'Acquisition GPS en cours…');
      gpsWatchId = navigator.geolocation.watchPosition(
        function (pos) {
          gpsPosition = {
            latitude:  pos.coords.latitude,
            longitude: pos.coords.longitude,
            accuracy:  Math.round(pos.coords.accuracy),
          };
          setGPSStatus('acquired',
            'GPS · ' + gpsPosition.latitude.toFixed(5) + ', ' +
            gpsPosition.longitude.toFixed(5) + ' (±' + gpsPosition.accuracy + 'm)'
          );
        },
        function () {
          setGPSStatus('error', 'GPS indisponible — capture autorisée sans coordonnées');
        },
        { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 }
      );
    }

    function stopGPS() {
      if (gpsWatchId !== null && navigator.geolocation) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
      }
    }

    function setGPSStatus(state, text) {
      elGpsStatus.className = state;
      elGpsText.textContent = text;
    }

    // ─── Helpers ──────────────────────────────────────────────────
    function zeroPad(n) { return String(n).padStart(2, '0'); }

    function formatDatetime(d) {
      return zeroPad(d.getDate()) + '/' + zeroPad(d.getMonth() + 1) + '/' +
             d.getFullYear() + ' — ' +
             zeroPad(d.getHours()) + ':' + zeroPad(d.getMinutes()) + ':' + zeroPad(d.getSeconds());
    }

    function showError(msg) {
      elError.textContent = msg;
      elError.classList.add('visible');
      setTimeout(function () { elError.classList.remove('visible'); }, 6000);
    }

    function updateCounter() {
      elCountCur.textContent = photos.length;
      elCountMax.textContent = settings.maxPhotos;
      elBtnCapture.disabled  = photos.length >= settings.maxPhotos || isProcessing;
    }

    function updateGrid() {
      if (photos.length === 0) {
        elEmpty.style.display = '';
        elGrid.innerHTML = '';
        return;
      }
      elEmpty.style.display = 'none';
      elGrid.innerHTML = '';
      photos.forEach(function (photo, i) {
        var card   = document.createElement('div');
        card.className = 'photo-card';

        var img    = document.createElement('img');
        img.src    = photo.previewUrl;
        img.alt    = 'Photo ' + (i + 1);

        var delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.setAttribute('aria-label', 'Supprimer photo ' + (i + 1));
        (function (idx) {
          delBtn.addEventListener('click', function () { deletePhoto(idx); });
        }(i));

        var idxLabel = document.createElement('span');
        idxLabel.className = 'photo-index';
        idxLabel.textContent = (i + 1) + ' / ' + photos.length;

        card.appendChild(img);

        // Si upload en cours (url === null), afficher spinner sur la carte
        if (photo.uploading) {
          var overlay = document.createElement('div');
          overlay.className = 'upload-overlay';
          var sp = document.createElement('div');
          sp.className = 'spinner';
          overlay.appendChild(sp);
          card.appendChild(overlay);
        }

        card.appendChild(delBtn);
        card.appendChild(idxLabel);
        elGrid.appendChild(card);
      });
    }

    function deletePhoto(index) {
      photos.splice(index, 1);
      updateCounter();
      updateGrid();
      sendDataToJotForm();
    }

    // ─── Chargement image via blob URL ────────────────────────────
    function loadImageFromBlob(blob) {
      return new Promise(function (resolve, reject) {
        var blobUrl = URL.createObjectURL(blob);
        var img     = new Image();
        img.onload = function () {
          URL.revokeObjectURL(blobUrl);
          resolve(img);
        };
        img.onerror = function () {
          URL.revokeObjectURL(blobUrl);
          reject(new Error('Impossible de charger l\'image'));
        };
        img.src = blobUrl;
      });
    }

    // ─── Dessin overlay sur canvas ────────────────────────────────
    function drawOverlay(ctx, canvasW, canvasH, captureTime, gps) {
      var overlayH = Math.max(56, Math.round(canvasH * 0.11));
      var y        = settings.overlayPosition === 'top' ? 0 : canvasH - overlayH;

      var grad = ctx.createLinearGradient(0, y, 0, y + overlayH);
      if (settings.overlayPosition === 'top') {
        grad.addColorStop(0, 'rgba(0,0,0,0.82)');
        grad.addColorStop(1, 'rgba(0,0,0,0.50)');
      } else {
        grad.addColorStop(0, 'rgba(0,0,0,0.50)');
        grad.addColorStop(1, 'rgba(0,0,0,0.84)');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, y, canvasW, overlayH);

      ctx.fillStyle = '#7c3aed';
      ctx.fillRect(0, settings.overlayPosition === 'top' ? y + overlayH - 2 : y, canvasW, 2);

      var fontSize = Math.max(11, Math.round(canvasW * 0.024));
      var lineH    = Math.round(fontSize * 1.42);
      var pad      = Math.round(canvasW * 0.016);

      var dateStr  = '\uD83D\uDCC5 ' + formatDatetime(captureTime);
      var gpsStr   = gps
        ? '\uD83D\uDCCD Lat: ' + gps.latitude.toFixed(6) + '  Lon: ' + gps.longitude.toFixed(6)
        : '\uD83D\uDCCD GPS non disponible';
      var brandStr = '\uD83D\uDD12 ' + settings.brandingText;

      ctx.shadowColor   = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur    = 3;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 1;

      var textY0 = settings.overlayPosition === 'top'
        ? y + lineH
        : y + overlayH - lineH * 2.6;

      ctx.font      = 'bold ' + fontSize + 'px Arial,sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(dateStr, pad, textY0);

      ctx.font      = 'bold ' + fontSize + 'px Arial,sans-serif';
      ctx.fillStyle = gps ? '#86efac' : '#fca5a5';
      ctx.fillText(gpsStr, pad, textY0 + lineH);

      ctx.shadowBlur = 2;
      ctx.font       = Math.round(fontSize * 0.76) + 'px Arial,sans-serif';
      ctx.fillStyle  = 'rgba(255,255,255,0.60)';
      ctx.fillText(brandStr, pad, textY0 + lineH * 2.05);

      ctx.shadowColor = 'transparent';
      ctx.shadowBlur  = 0;
    }

    // ─── Traitement canvas → Blob ─────────────────────────────────
    function processPhoto(file, captureTime) {
      return new Promise(function (resolve, reject) {
        loadImageFromBlob(file).then(function (img) {
          var scale  = Math.min(1, settings.maxWidth / img.naturalWidth);
          var cw     = Math.round(img.naturalWidth  * scale);
          var ch     = Math.round(img.naturalHeight * scale);

          var canvas = document.createElement('canvas');
          canvas.width  = cw;
          canvas.height = ch;
          var ctx    = canvas.getContext('2d');

          ctx.drawImage(img, 0, 0, cw, ch);
          img = null;

          drawOverlay(ctx, cw, ch, captureTime, gpsPosition);

          canvas.toBlob(function (blob) {
            canvas.width  = 0;
            canvas.height = 0;
            if (!blob) {
              reject(new Error('toBlob a retourné null'));
              return;
            }
            resolve(blob);
          }, 'image/jpeg', settings.imageQuality);

        }).catch(reject);
      });
    }

    // ─── Upload vers Cloudflare Worker ───────────────────────────
    function uploadToWorker(blob, filename) {
      var form = new FormData();
      form.append('file', blob, filename);
      form.append('filename', filename);

      return fetch(settings.uploadWorkerUrl + '/upload', {
        method: 'POST',
        body: form,
      }).then(function (res) {
        if (!res.ok) {
          return res.text().then(function (t) {
            throw new Error('Worker HTTP ' + res.status + ': ' + t);
          });
        }
        return res.json();
      }).then(function (data) {
        if (!data.url) throw new Error('Pas d\'URL dans la réponse du Worker');
        return data.url;
      });
    }

    // ─── Fallback : Blob → base64 ─────────────────────────────────
    function blobToBase64(blob) {
      return new Promise(function (resolve, reject) {
        var reader = new FileReader();
        reader.onload  = function (e) { resolve(e.target.result); };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    // ─── Gestion de la sélection fichier ─────────────────────────
    elFileInput.addEventListener('change', function (e) {
      var file = e.target.files && e.target.files[0];
      elFileInput.value = '';
      if (!file) return;

      if (photos.length >= settings.maxPhotos) {
        showError('Limite de ' + settings.maxPhotos + ' photo(s) atteinte.');
        return;
      }
      if (settings.requireGPS && !gpsPosition) {
        showError('La géolocalisation est requise. Veuillez activer le GPS.');
        return;
      }

      var captureTime = new Date();
      var filename    = 'photo_' + Date.now() + '.jpg';
      isProcessing = true;
      elBtnCapture.disabled = true;
      elProcessingTxt.textContent = 'Traitement en cours…';
      elProcessing.classList.add('visible');

      processPhoto(file, captureTime).then(function (blob) {
        // Créer un blob URL temporaire pour la preview immédiate
        var previewBlobUrl = URL.createObjectURL(blob);

        var photoEntry = {
          filename:  filename,
          previewUrl: previewBlobUrl,
          url:        null,    // sera rempli après upload
          base64:     null,    // sera rempli en fallback
          timestamp:  captureTime.toISOString(),
          lat:        gpsPosition ? gpsPosition.latitude  : null,
          lon:        gpsPosition ? gpsPosition.longitude : null,
          uploading:  true,
        };
        photos.push(photoEntry);

        // Afficher immédiatement la preview avec spinner
        isProcessing = false;
        elProcessing.classList.remove('visible');
        updateCounter();
        updateGrid();

        var useWorker = settings.uploadWorkerUrl && settings.uploadWorkerUrl.length > 0;

        if (useWorker) {
          // ── Mode Storage : upload vers Supabase via Worker ──────
          elProcessingTxt.textContent = 'Upload en cours…';
          elProcessing.classList.add('visible');

          uploadToWorker(blob, filename).then(function (url) {
            // Libérer le blob URL temporaire
            URL.revokeObjectURL(previewBlobUrl);

            photoEntry.url        = url;
            photoEntry.previewUrl = url;   // utiliser l'URL Supabase comme preview
            photoEntry.uploading  = false;

            blob = null;
            elProcessing.classList.remove('visible');
            updateGrid();
            sendDataToJotForm();

          }).catch(function (err) {
            console.error('[Widget] uploadToWorker error:', err);
            // Fallback base64 si l'upload échoue
            blobToBase64(blob).then(function (b64) {
              URL.revokeObjectURL(previewBlobUrl);
              photoEntry.base64     = b64;
              photoEntry.previewUrl = b64;
              photoEntry.uploading  = false;
              blob = null;
              elProcessing.classList.remove('visible');
              updateGrid();
              sendDataToJotForm();
            }).catch(function () {
              elProcessing.classList.remove('visible');
              photos.pop();
              updateCounter();
              updateGrid();
              showError('Erreur upload. Veuillez réessayer.');
            });
          });

        } else {
          // ── Mode base64 (fallback si pas de Worker configuré) ───
          blobToBase64(blob).then(function (b64) {
            URL.revokeObjectURL(previewBlobUrl);
            photoEntry.base64     = b64;
            photoEntry.previewUrl = b64;
            photoEntry.uploading  = false;
            blob = null;
            updateGrid();
            sendDataToJotForm();
          }).catch(function (err) {
            console.error('[Widget] blobToBase64 error:', err);
            photos.pop();
            updateCounter();
            updateGrid();
            showError('Erreur lors du traitement. Veuillez réessayer.');
          });
        }

      }).catch(function (err) {
        console.error('[Widget] processPhoto error:', err);
        isProcessing = false;
        elProcessing.classList.remove('visible');
        updateCounter();
        showError('Erreur lors du traitement. Veuillez réessayer.');
      });
    });

    elBtnCapture.addEventListener('click', function () {
      if (photos.length >= settings.maxPhotos) {
        showError('Limite de ' + settings.maxPhotos + ' photo(s) atteinte.');
        return;
      }
      elFileInput.click();
    });

    JFCustomWidget && JFCustomWidget.subscribe && JFCustomWidget.subscribe('clear', stopGPS);

    // ─── Initialisation ───────────────────────────────────────────
    function init(s) {
      settings.maxPhotos       = Math.max(1, Math.min(10, parseInt(s.maxPhotos, 10) || 3));
      settings.brandingText    = s.brandingText    || 'HARS Analytics — Horodatage certifié';
      settings.imageQuality    = Math.max(0.5, Math.min(1, parseFloat(s.imageQuality) || 0.82));
      settings.maxWidth        = Math.max(800, Math.min(2560, parseInt(s.maxWidth, 10) || 1280));
      settings.requireGPS      = s.requireGPS === 'true' || s.requireGPS === true;
      settings.overlayPosition = s.overlayPosition === 'top' ? 'top' : 'bottom';
      settings.uploadWorkerUrl = (s.uploadWorkerUrl || '').replace(/\/$/, '');

      updateCounter();
      updateGrid();
      startGPS();
    }

    // ─── Intégration JotForm ──────────────────────────────────────
    function buildValue() {
      // Ne pas envoyer si des uploads sont encore en cours
      var uploading = photos.some(function (p) { return p.uploading; });
      if (uploading) return '';
      if (photos.length === 0) return '';

      try {
        return JSON.stringify(photos.map(function (p) {
          var entry = {
            filename:  p.filename,
            timestamp: p.timestamp,
            lat:       p.lat,
            lon:       p.lon,
          };
          // Mode Storage : envoyer l'URL (quelques octets)
          // Mode fallback : envoyer le base64 (plusieurs MB)
          if (p.url) {
            entry.url = p.url;
          } else {
            entry.base64 = p.base64 || '';
          }
          return entry;
        }));
      } catch (e) {
        console.error('[Widget] buildValue error:', e);
        return '';
      }
    }

    function sendDataToJotForm() {
      try {
        JFCustomWidget.sendData({ value: buildValue() });
      } catch (e) { /* hors contexte JotForm */ }
    }

    var isInJotFormIframe = typeof JFCustomWidget !== 'undefined' && window !== window.parent;

    if (isInJotFormIframe) {

      JFCustomWidget.subscribe('ready', function () {
        try {
          init({
            maxPhotos:       JFCustomWidget.getWidgetSetting('maxPhotos'),
            brandingText:    JFCustomWidget.getWidgetSetting('brandingText'),
            imageQuality:    JFCustomWidget.getWidgetSetting('imageQuality'),
            maxWidth:        JFCustomWidget.getWidgetSetting('maxWidth'),
            requireGPS:      JFCustomWidget.getWidgetSetting('requireGPS'),
            overlayPosition: JFCustomWidget.getWidgetSetting('overlayPosition'),
            uploadWorkerUrl: JFCustomWidget.getWidgetSetting('uploadWorkerUrl'),
          });
        } catch (e) {
          init({});
        }
        JFCustomWidget.sendData({ value: '' });
      });

      // NE PAS s'abonner à "submit" — le SDK a son propre handler par défaut.

    } else {
      console.log('[Widget Photo] Mode standalone');
      init({});
    }

  }());
  </script>
</body>
</html>
